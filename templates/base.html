<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRUD Alumnos – Flask</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f0f4ff; }
    .navbar-brand { font-family: 'Space Mono', monospace; font-weight: 700; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .btn-primary { background: #4361ee; border-color: #4361ee; }
    .btn-primary:hover { background: #3a56d4; }
    table thead { background: #4361ee; color: #fff; }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark mb-4" style="background:#f51010;">
    <div class="container">
      <a class="navbar-brand" href="/">CRUD Alumnos</a>
    </div>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<footer class="text-center text-muted py-4 mt-5" style="font-size: 0.85rem; border-top: 1px solid #dee2e6;">
  Hecho por <strong>Kathleen Vargas Cáceres</strong>
</footer>e
</html>
